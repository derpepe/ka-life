[build]
  # Vite baut nur das Frontend
  command = "npm run build:static"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  # Use modern function runtime with full Web Fetch API support
  node_bundler = "esbuild"

# SPA-Routing: alle Pfade -> index.html (Hash-Routing braucht das nicht zwingend,
# aber schadet nicht als Fallback)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
